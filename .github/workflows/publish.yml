name: Publish

# Publishes to npm with provenance via OIDC Trusted Publishing.
# One-time setup on npmjs.com: package "pickem" → Settings → Trusted Publisher →
#   GitHub repo: calebogden/pickem-oss, workflow: publish.yml
# No NPM_TOKEN secret is needed once the trusted publisher is configured.
#
# Triggered only by a published GitHub Release (no workflow_dispatch — keeps the
# provenance-signing, id-token:write job off an ad-hoc manual trigger).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Actions are SHA-pinned (not mutable tags) so a compromised tag can't inject
      # into this id-token-privileged job. Version in the trailing comment.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24 # bundles npm 11.x natively (OIDC needs >= 11.5.1)
          cache: npm
      # Do NOT set registry-url — it writes an .npmrc with an empty NODE_AUTH_TOKEN
      # that shadows OIDC trusted-publishing auth. Pin npm (not @latest) for a
      # reproducible, supply-chain-stable toolchain, then prove the version.
      - run: npm install -g npm@11.17.0
      - run: npm -v
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # publishConfig + build emit dist/ as the package root; publish from there.
      - run: npm publish --provenance --access public
        working-directory: dist
